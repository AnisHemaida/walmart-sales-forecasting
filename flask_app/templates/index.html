const useData = (url) => {
  const [data, setData]   = React.useState(null);
  const [error, setError] = React.useState(null);
  React.useEffect(() => {
    fetch(url).then(r => r.json()).then(setData).catch(setError);
  }, [url]);
  return { data, error, loading: !data && !error };
};

const PlotlyChart = ({ data, layout, height = 360 }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || !window.Plotly) return;
    const full = {
      margin: { t: 20, r: 20, b: 50, l: 65 },
      font: { family: 'Inter, sans-serif', size: 11 },
      paper_bgcolor: 'white', plot_bgcolor: '#fafafa',
      legend: { font: { size: 11 } },
      ...layout,
    };
    Plotly.react(ref.current, data, full, { responsive: true, displayModeBar: false });
    const t = setTimeout(() => { if (ref.current) Plotly.Plots.resize(ref.current); }, 0);
    return () => { clearTimeout(t); if (ref.current) Plotly.purge(ref.current); };
  }, [data, layout]);
  return <div ref={ref} style={{ width: '100%', height }} />;
};

const DualSlider = ({ total, minVal, maxVal, onMin, onMax }) => {
  const trackRef = React.useRef(null);
  const dragging  = React.useRef(null);
  const pMin = (minVal/total)*100;
  const pMax = (maxVal/total)*100;

  const getIdx = (clientX) => {
    const rect = trackRef.current.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(pct * total);
  };

  const onPointerDown = (e) => {
    const idx   = getIdx(e.clientX);
    const dMin  = Math.abs(idx - minVal);
    const dMax  = Math.abs(idx - maxVal);
    dragging.current = dMin <= dMax ? 'min' : 'max';
    trackRef.current.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragging.current) return;
    const idx = getIdx(e.clientX);
    if (dragging.current === 'min' && idx < maxVal) onMin(idx);
    if (dragging.current === 'max' && idx > minVal) onMax(idx);
  };
  const onPointerUp = () => { dragging.current = null; };

  return (
    <div ref={trackRef} style={{ flex:1, position:'relative', height:20, cursor:'pointer', userSelect:'none' }}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp}>
      <div style={{ position:'absolute', top:'50%', transform:'translateY(-50%)', left:0, right:0, height:4, background:'#e2e8f0', borderRadius:2 }}>
        <div style={{ position:'absolute', left:`${pMin}%`, right:`${100-pMax}%`, height:'100%', background:'#0071CE', borderRadius:2 }} />
      </div>
      {[{p:pMin,label:'min'},{p:pMax,label:'max'}].map(({p,label}) => (
        <div key={label} style={{ position:'absolute', top:'50%', transform:'translate(-50%,-50%)', left:`${p}%`,
          width:16, height:16, borderRadius:'50%', background:'white', border:'2.5px solid #0071CE',
          boxShadow:'0 1px 4px rgba(0,0,0,0.25)', zIndex:2 }} />
      ))}
    </div>
  );
};

const GaugeChart = ({ value, min = 0, max = 60000 }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || !window.Plotly) return;
    Plotly.newPlot(ref.current, [{
      type:'indicator', mode:'gauge+number+delta',
      value,
      number:{ valueformat:',.0f', suffix:' $', font:{ size:32, color:C2.BLUE, family:'Inter' } },
      delta:{ reference:20117, valueformat:',.0f', font:{ size:14 } },
      gauge:{
        axis:{ range:[min,max], tickformat:',.0f', nticks:6, tickfont:{ size:10 } },
        bar:{ color:C2.BLUE, thickness:0.25 },
        bgcolor:'#f0f4f8',
        steps:[
          { range:[0,15000],    color:'rgba(231,76,60,0.15)'  },
          { range:[15000,25000],color:'rgba(255,194,32,0.15)' },
          { range:[25000,60000],color:'rgba(39,174,96,0.15)'  },
        ],
        threshold:{ line:{ color:C2.ORANGE, width:3 }, thickness:0.75, value:20117 },
      },
    }], {
      margin:{ t:40, b:10, l:30, r:30 },
      paper_bgcolor:'white',
      annotations:[{ text:'vs moyenne: 20 117 $', x:0.5, y:-0.05, xref:'paper', yref:'paper', showarrow:false, font:{ size:11, color:'#94a3b8' } }],
    }, { responsive:true, displayModeBar:false });
    return () => { if (ref.current) Plotly.purge(ref.current); };
  }, [value]);
  return <div ref={ref} style={{ width:'100%', height:260 }} />;
};

      const respAll = await fetch(`/api/stock?${qGlobal}`);
      const dataAll = await respAll.json();
      setAllRows(dataAll.rows || []);
    } catch(err) { setErrMsg(err.message); }
    setLoading(false);
  };

  const rows      = result?.rows || [];
  const counts    = result?.counts || { CRITIQUE:0, HAUTE:0, MODEREE:0, OK:0 };
  // r0 = ligne du dept sélectionné pour les KPIs détaillés

    <PageLayout

            {[
              { key:'S',  label:'S — Coût de commande ($)',      min:10,   max:500,  step:10,  unit:'$',  def:50  },
              { key:'H',  label:'H — Taux de possession (%/an)', min:5,    max:50,   step:1,   unit:'%',  def:20  },
              { key:'L',  label:'L — Délai de livraison (sem.)', min:1,    max:12,   step:1,   unit:'sem',def:1   },
            ].map(({ key, label, min, max, step, unit, def }) => (
              <div key={key} style={{ marginBottom:16 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                  <span className="form-label">{label}</span>
                  <span style={{ fontSize:13, fontWeight:700, color:'#0071CE' }}>{form[key]} {unit}</span>
                </div>
                <div style={{ position:'relative', height:20, display:'flex', alignItems:'center' }}>
                  <div style={{ position:'absolute', left:0, right:0, height:4, background:'#e2e8f0', borderRadius:2 }}>
                    <div style={{ position:'absolute', left:0, width:`${((parseFloat(form[key])-min)/(max-min))*100}%`, height:'100%', background:'#0071CE', borderRadius:2 }}/>
                  </div>
                  <input type="range" min={min} max={max} step={step} value={form[key]}
                    onChange={e=>up(key,e.target.value)}
                    style={{ position:'absolute', width:'100%', cursor:'pointer', accentColor:'#0071CE' }}/>
                </div>

              <select className="form-select" value={form.Z} onChange={e=>up('Z',e.target.value)}>

                <option value="1.65">95% (Z = 1.65)</option>
                <option value="2.05">98% (Z = 2.05)</option>
                <option value="2.33">99% (Z = 2.33)</option>

          </div>

          {errMsg && <div style={{ marginTop:12, padding:'10px 14px', background:'#fef2f2', color:'#dc2626', borderRadius:8, fontSize:13 }}>{errMsg}</div>}
          <button type="submit" className="submit-btn" disabled={loading}>

                    color: allRows.map(r=>r.EOQ),

                  showlegend:false,
                }}/>
              </div>
            )}

          </>)}
        </div>
      </div>

      {/* Tableau global tous les Store×Dept */}
      {result && rows.length > 0 && (
        <div className="chart-card" style={{ marginTop:0 }}>
          <div className="chart-title" style={{ marginBottom:14 }}>
            Tableau complet — tous les départements · Magasin {form.store}
          </div>

          {/* KPIs résumé */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:16 }}>
            {[
              { label:'CRITIQUE', key:'CRITIQUE', icon:'🔴' },
              { label:'HAUTE',    key:'HAUTE',    icon:'🟠' },
              { label:'MODÉRÉE',  key:'MODEREE',  icon:'🟡' },
              { label:'OK',       key:'OK',       icon:'🟢' },
            ].map(({ label, key, icon }) => (
              <div key={key} className="kpi-card" style={{ paddingBottom:14 }}>
                <div className="kpi-label">{icon} {label}</div>
                <div className="kpi-value" style={{ color:urgColorMap[key], fontSize:20 }}>{counts[key]}</div>
                <div className="kpi-sub">Store × Dept</div>
                <div className="kpi-bar" style={{ background:urgColorMap[key] }}/>
              </div>
            ))}
          </div>

          <div style={{ overflowX:'auto' }}>
            <table className="history-table" style={{ fontSize:11 }}>
              <thead>
                <tr>
                  <th>Magasin</th><th>Dept</th>
                  <th style={{textAlign:'right'}}>Ventes moy. ($)</th>
                  <th style={{textAlign:'right'}}>EOQ ($)</th>
                  <th style={{textAlign:'right'}}>Stock sécurité ($)</th>
                  <th style={{textAlign:'right'}}>Stock cible ($)</th>
                  <th style={{textAlign:'right'}}>CV</th>
                  <th>Urgence</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r,i) => (
                  <tr key={i} style={{ background: r.Urgence!=='OK' ? urgBg(r.Urgence) : 'white' }}>
                    <td>M{r.Store}</td>
                    <td>D{r.Dept}</td>

                       :'—'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </PageLayout>
  );
};

const BatchContent = () => {
  const [file,       setFile]       = React.useState(null);
  const [loading,    setLoading]    = React.useState(false);
  const [results,    setResults]    = React.useState(null);
  const [errMsg,     setErrMsg]     = React.useState('');
  const [dragOver,   setDragOver]   = React.useState(false);

  const handleFile = (f) => { setFile(f); setResults(null); setErrMsg(''); };

  const handleSubmit = async () => {
    if (!file) return;
    setLoading(true); setErrMsg('');
    const fd = new FormData();
    fd.append('file', file);
    try {
      const resp = await fetch('/api/predict/batch', { method:'POST', body: fd });
      const data = await resp.json();
      if (data.error) { setErrMsg(data.error); } else { setResults(data.results); }
    } catch(e) { setErrMsg(e.message); }
    setLoading(false);
  };

  const downloadCSV = () => {
    if (!results) return;
    const header = 'Store,Dept,Date,Prevision,Erreur';
    const rows = results.map(r => `${r.Store},${r.Dept},${r.Date},${r.Prevision??''},${r.Erreur}`);
    const blob = new Blob([header + '\n' + rows.join('\n')], { type:'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='previsions_batch.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  const ok  = results ? results.filter(r=>r.Prevision!==null).length : 0;
  const err = results ? results.filter(r=>r.Prevision===null).length  : 0;

  return (
      <div style={{ maxWidth:900, display:'flex', flexDirection:'column', gap:20 }}>

        <div className="form-card">
          <div style={{ fontWeight:700, fontSize:15, marginBottom:6, color:'#1a2332' }}>Structure requise du fichier</div>
          <div style={{ fontSize:12, color:'#64748b', marginBottom:14 }}>Le fichier CSV doit contenir au minimum les colonnes : <strong>Store, Dept, Date</strong>. Les colonnes optionnelles améliorent la précision : Weekly_Sales, IsHoliday, Temperature, Fuel_Price, CPI, Unemployment, MarkDown1–5, Type, Size.</div>
          <div style={{ fontFamily:'monospace', fontSize:11, background:'#f8fafc', borderRadius:8, padding:'10px 14px', color:'#475569', overflowX:'auto', whiteSpace:'nowrap' }}>
            Store,Dept,Date,Weekly_Sales,IsHoliday,Temperature,Fuel_Price,MarkDown1,MarkDown2,MarkDown3,MarkDown4,MarkDown5,CPI,Unemployment,Type,Size
          </div>
        </div>

        <div className="form-card">
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)handleFile(f);}}
            style={{ border:`2px dashed ${dragOver?'#0071CE':'#e2e8f0'}`, borderRadius:12, padding:'36px 20px', textAlign:'center', background: dragOver?'#e6f1fb':'#f8fafc', transition:'all 0.2s', cursor:'pointer' }}
            onClick={()=>document.getElementById('csv-upload').click()}
          >
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke={dragOver?'#0071CE':'#94a3b8'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:10}}>

              <table className="history-table">
                <thead><tr><th>Magasin</th><th>Dept</th><th>Date</th><th>Prévision ($)</th><th>Statut</th></tr></thead>
                <tbody>
                  {results.map((r,i) => (
                    <tr key={i}>

                      <td>D{r.Dept}</td>

                      <td style={{ fontWeight:700, color: r.Prevision ? C2.BLUE : '#dc2626' }}>

                      </td>
                    </tr>
                  ))}

              </table>
            </div>
          </div>
        )}
      </div>

};

                    { key:'fuelPrice',    label:'Prix carburant ($/gal)', min:2.5, max:5.0,  step:0.01, unit:'$'   },
                    { key:'cpi',          label:'Indice CPI',            min:125, max:230,  step:0.1,  unit:''    },
                    { key:'unemployment', label:'Taux chômage',          min:3,   max:15,   step:0.1,  unit:'%'   },
                  ].map(({ key, label, min, max, step, unit }) => (
                    <div key={key}>
                      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                        <span className="form-label">{label}</span>
                        <span style={{ fontSize:13, fontWeight:700, color:'#0071CE' }}>{parseFloat(form[key]).toFixed(step<1?2:0)} {unit}</span>
                      </div>
                      <div style={{ position:'relative', height:20, display:'flex', alignItems:'center' }}>
                        <div style={{ position:'absolute', left:0, right:0, height:4, background:'#e2e8f0', borderRadius:2 }}>
                          <div style={{ position:'absolute', left:0, width:`${((parseFloat(form[key])-min)/(max-min))*100}%`, height:'100%', background:'#0071CE', borderRadius:2 }} />
                        </div>
                        <input type="range" min={min} max={max} step={step} value={form[key]}
                          onChange={e => up(key, e.target.value)}
                          style={{ position:'absolute', width:'100%', cursor:'pointer', accentColor:'#0071CE' }} />
                      </div>
                      <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'#94a3b8', marginTop:3 }}>
                        <span>{min}{unit}</span><span>{max}{unit}</span>
                      </div>
                    </div>
                  ))}
                </div>}
              </div>
              <div style={{ gridColumn:'1/-1', borderTop:'1px solid #f1f5f9', marginTop:4 }}>
                <button type="button" onClick={() => setOpenPromo(o => !o)}
                  style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', background:'none', border:'none', cursor:'pointer', padding:'14px 0 14px', fontFamily:'inherit' }}>
                  <span style={{ fontSize:12, fontWeight:600, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.5px' }}>Promotions <span style={{ fontWeight:400, textTransform:'none', fontSize:11 }}>(optionnel)</span></span>
                  <span style={{ fontSize:16, color:'#94a3b8', transform: openPromo ? 'rotate(180deg)' : 'rotate(0deg)', transition:'transform 0.2s' }}>▾</span>
                </button>
                {openPromo && <div style={{ display:'flex', flexDirection:'column', gap:14, paddingBottom:14 }}>
                  {[
                    { key:'md1', label:'Promotion 1 — Remise directe',      max:50000 },
                    { key:'md2', label:'Promotion 2 — Rabais général',       max:50000 },
                    { key:'md3', label:'Promotion 3 — Remise fournisseur',   max:30000 },
                    { key:'md4', label:'Promotion 4 — Liquidation',          max:30000 },
                    { key:'md5', label:'Promotion 5 — Remise saisonnière',   max:30000 },
                  ].map(({ key, label, max }) => (
                    <div key={key}>
                      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                        <span className="form-label">{label}</span>
                        <span style={{ fontSize:13, fontWeight:700, color: parseFloat(form[key])>0 ? '#27AE60' : '#94a3b8' }}>
                          {parseFloat(form[key])>0 ? `${parseInt(form[key]).toLocaleString()} $` : 'Inactif'}
                        </span>
                      </div>
                      <div style={{ position:'relative', height:20, display:'flex', alignItems:'center' }}>
                        <div style={{ position:'absolute', left:0, right:0, height:4, background:'#e2e8f0', borderRadius:2 }}>
                          <div style={{ position:'absolute', left:0, width:`${(parseFloat(form[key])/max)*100}%`, height:'100%', background:'#27AE60', borderRadius:2 }} />
                        </div>
                        <input type="range" min={0} max={max} step={100} value={form[key]}
                          onChange={e => up(key, e.target.value)}
                          style={{ position:'absolute', width:'100%', cursor:'pointer', accentColor:'#27AE60' }} />
                      </div>
                      <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'#94a3b8', marginTop:3 }}>
                        <span>0 $</span><span>{(max/1000).toFixed(0)}k $</span>
                      </div>
                    </div>
                  ))}
                </div>}
              </div>
            </div>
            {errMsg && <div style={{ marginTop:12, padding:'10px 14px', background:'#fef2f2', color:'#dc2626', borderRadius:8, fontSize:13 }}>{errMsg}</div>}
            <button type="submit" className="submit-btn" disabled={loading}>
              {loading ? 'Calcul en cours…' : ' Lancer la prévision'}
            </button>
            <button type="button" onClick={()=>setSimMode('batch')}
              style={{ width:'100%', marginTop:10, padding:'10px', display:'flex', alignItems:'center', justifyContent:'center', gap:8, background:'#f1f5f9', color:'#475569', border:'1.5px dashed #cbd5e1', borderRadius:10, fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>
              <SvgIcon size={15}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></SvgIcon>
              Insérer fichier CSV / Excel
            </button>
          </form>

          <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
            <div className="result-card">
              {!result && !loading && (
                <div className="placeholder-result">
                  <div style={{ marginBottom:16, opacity:0.18 }}>
                    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#0071CE" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                  </div>
                  <div style={{ fontSize:15, fontWeight:600, color:'#94a3b8', marginBottom:8 }}>Résultat de prévision</div>
                  <p>Renseignez les paramètres et lancez la prévision pour obtenir une estimation des ventes hebdomadaires.</p>
                </div>
              )}
              {loading && (
                <div className="placeholder-result">
                  <div style={{ fontSize:14, color:'#64748b' }}>Calcul en cours…</div>
                  <div style={{ fontSize:12, color:'#94a3b8', marginTop:8, fontFamily:'monospace' }}>POST /api/predict → model.pkl</div>
                </div>
              )}
              {result && !loading && (
                <div>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                    <div style={{ fontWeight:700, fontSize:15 }}>Prévisions — Magasin {form.store} · Dept {form.dept}</div>
                    <span style={{ background:'#dcfce7', color:'#166534', fontSize:11, padding:'3px 10px', borderRadius:12, fontWeight:600 }}>✓ {result.rows.length} semaine{result.rows.length>1?'s':''}</span>
                  </div>

                  <PlotlyChart
                    height={240}
                    data={[
                      {
                        x: result.rows.map(r=>r.date), y: result.rows.map(r=>r.upper),
                        type:'scatter', mode:'lines', name:'Borne haute',
                        line:{ width:0 }, showlegend:false, hoverinfo:'skip',
                      },
                      {
                        x: result.rows.map(r=>r.date), y: result.rows.map(r=>r.lower),
                        type:'scatter', mode:'lines', name:'Intervalle ±5%',
                        fill:'tonexty', fillcolor:'rgba(0,113,206,0.10)',
                        line:{ width:0 }, hoverinfo:'skip',
                      },
                      {
                        x: result.rows.map(r=>r.date), y: result.rows.map(r=>r.pred),
                        type:'scatter', mode:'lines+markers', name:'Prévision hebdomadaire',
                        line:{ color:'#0071CE', width:2.5 },
                        marker:{ color:'#0071CE', size:7 },
                      },
                    ]}
                    layout={{
                      plot_bgcolor:'white', paper_bgcolor:'white',
                      margin:{ t:10, b:50, l:70, r:10 },
                      xaxis:{ showgrid:false, zeroline:false, tickangle:-30, tickfont:{size:10} },
                      yaxis:{ tickformat:',.0f', showgrid:true, gridcolor:'#f1f5f9', zeroline:false, tickfont:{size:10}, title:'Ventes ($)' },
                      legend:{ orientation:'h', x:0.5, xanchor:'center', y:-0.3, font:{size:11} },
                      showlegend:true,
                    }}
                  />

                  <div style={{ marginTop:16, overflowX:'auto' }}>
                    <table className="history-table" style={{ fontSize:12 }}>
                      <thead>
                        <tr>
                          <th>Semaine</th>
                          <th>Date</th>
                          <th style={{textAlign:'right'}}>Prévision ($)</th>
                          <th style={{textAlign:'right'}}>Borne basse (−5%)</th>
                          <th style={{textAlign:'right'}}>Borne haute (+5%)</th>
                        </tr>
                      </thead>
                      <tbody>
                        {result.rows.map(r => (
                          <tr key={r.week} style={ r.week===result.rows.length ? { background:'#eff6ff', fontWeight:700 } : {} }>
                            <td style={{fontFamily:'monospace', color:'#64748b'}}>Sem. {r.week}</td>
                            <td style={{fontFamily:'monospace'}}>{r.date}</td>
                            <td style={{textAlign:'right', color:'#0071CE', fontWeight:600}}>{FMTNUM(r.pred)} $</td>
                            <td style={{textAlign:'right', color:'#94a3b8'}}>{FMTNUM(r.lower)} $</td>
                            <td style={{textAlign:'right', color:'#94a3b8'}}>{FMTNUM(r.upper)} $</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
            {history.length > 0 && (
              <div className="form-card">
                <div style={{ fontWeight:700, fontSize:14, marginBottom:14, color:'#1a2332' }}>Historique des prévisions</div>
                <table className="history-table">
                  <thead><tr><th>Heure</th><th>Magasin</th><th>Dept</th><th>Prévision</th></tr></thead>
                  <tbody>
                    {history.map((h,i) => (
                      <tr key={i}>
                        <td style={{ fontFamily:'monospace', color:'#94a3b8' }}>{h.ts}</td>
                        <td>M{h.store} <span style={{ color:'#94a3b8' }}>(T{h.storeType})</span></td>
                        <td>D{h.dept}</td>
                        <td style={{ fontWeight:700, color:C2.BLUE }}>{FMTNUM(h.prediction)} $</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
    </PageLayout>
  );
};

// ════════════════════════════════════════════════════════════════
// BLOC 4 — App + Sidebar (style Claude Design)

const WalmartSpark = () => (
  <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
    {[0,60,120,180,240,300].map((angle, i) => {
      const r = Math.PI / 180 * angle;
      return <line key={i} x1={26+6*Math.cos(r)} y1={26+6*Math.sin(r)} x2={26+22*Math.cos(r)} y2={26+22*Math.sin(r)} stroke="white" strokeWidth="4.5" strokeLinecap="round"/>;
    })}
    <circle cx="26" cy="26" r="3" fill="white"/>
  </svg>
);

// ── Icônes SVG professionnelles ───────────────────────────────
const SvgIcon = ({ children, size = 18 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    {children}
  </svg>
);

const NAV_ICONS = {
  overview:        <SvgIcon><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></SvgIcon>,
  temporal:        <SvgIcon><polyline points="2,17 7,10 12,13 17,6 22,3"/><polyline points="17,3 22,3 22,8"/></SvgIcon>,
  stores:          <SvgIcon><path d="M3 9.5L12 3l9 6.5V21H3z"/><rect x="9" y="14" width="6" height="7" rx="0.5"/></SvgIcon>,
  departments:     <SvgIcon><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 12l10 5 10-5"/><path d="M2 17l10 5 10-5"/></SvgIcon>,
  promotions:      <SvgIcon><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></SvgIcon>,
  holidays:        <SvgIcon><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></SvgIcon>,
  economic:        <SvgIcon><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17H8v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/><path d="M9 17v1a3 3 0 006 0v-1"/><line x1="12" y1="9" x2="12" y2="13"/></SvgIcon>,
  correlations:    <SvgIcon><circle cx="5" cy="19" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><circle cx="5" cy="5" r="2"/><line x1="7" y1="17" x2="17" y2="7"/><line x1="7" y1="7" x2="17" y2="17"/></SvgIcon>,
  recommendations: <SvgIcon><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></SvgIcon>,
  stock:           <SvgIcon><path d="M3 9.5L12 3l9 6.5V21H3z"/><rect x="9" y="14" width="6" height="7"/><line x1="12" y1="9" x2="12" y2="13"/></SvgIcon>,
  prediction:      <SvgIcon><path d="M12 3l1.5 3 3.5.5-2.5 2.5.5 3.5L12 11l-3 1.5.5-3.5L7 6.5l3.5-.5L12 3z"/><path d="M5 20l2-2M19 20l-2-2M12 22v-3"/><circle cx="12" cy="15" r="2"/></SvgIcon>,
};

const ANALYTICS = [
  { id:'overview',        label:"Vue d'ensemble",         icon: NAV_ICONS.overview,        comp:OverviewPage        },
  { id:'temporal',        label:'Tendances temporelles',  icon: NAV_ICONS.temporal,        comp:TemporalPage         },
  { id:'stores',          label:'Types de magasins',      icon: NAV_ICONS.stores,          comp:StoresPage           },
  { id:'departments',     label:'Analyse par département',icon: NAV_ICONS.departments,     comp:DepartmentsPage      },
  { id:'promotions',      label:'Impact des promotions',  icon: NAV_ICONS.promotions,      comp:PromotionsPage       },
  { id:'holidays',        label:'Effet des jours fériés', icon: NAV_ICONS.holidays,        comp:HolidaysPage         },
  { id:'economic',        label:'Variables économiques',  icon: NAV_ICONS.economic,        comp:EconomicPage         },
];
const MODELES = [
  { id:'prediction', label:'Prévision IA', icon: NAV_ICONS.prediction, comp:PredictionPage, badge:'NEW' },
];

const App = () => {
  const [active,  setActive]  = React.useState('overview');
  const [subTab,  setSubTab]  = React.useState('monitoring');
  const all = [...ANALYTICS, ...MODELES];

  const goTo = (id) => { setActive(id); };

  let PageComp = null;
  if (active === 'prediction') {
    PageComp = subTab === 'monitoring' ? DashboardPage : subTab === 'stock' ? StockPage : subTab === 'promo' ? PromoPage : PredictionPage;
  } else {
    PageComp = (all.find(p => p.id === active) || all[0]).comp;
  }

  return (
    <div className="app-container">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <img src="/static/Logo Walmart.png" alt="Walmart" style={{ width:'150px', marginBottom:8 }} />
          <div className="logo-sub" style={{ whiteSpace:'nowrap' }}>Système de prévision des ventes</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">Analyse exploratoire</div>
          {ANALYTICS.map(p => (
            <button key={p.id} className={`nav-item ${active===p.id?'active':''}`} onClick={() => goTo(p.id)}>
              <span className="nav-icon">{p.icon}</span>
              {p.label}
            </button>
          ))}
          <div className="nav-section">Modélisation</div>
          <button className={`nav-item ${active==='prediction'?'active':''}`} onClick={() => goTo('prediction')}>
            <span className="nav-icon">{NAV_ICONS.prediction}</span>
            Prévision IA
            <span className="nav-badge">NEW</span>
          </button>
          {active === 'prediction' && (
            <div style={{ marginLeft:12, borderLeft:'2px solid rgba(255,255,255,0.15)', paddingLeft:8 }}>
              {[
                { id:'monitoring', label:'Monitoring',         icon:<SvgIcon size={15}><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><polyline points="6 9 9 12 12 9 15 12 18 9"/></SvgIcon> },
                { id:'simulator',  label:'Simulateur',         icon:<SvgIcon size={15}><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></SvgIcon> },
                { id:'promo',      label:'Promotions',         icon:<SvgIcon size={15}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></SvgIcon> },
                { id:'stock',      label:'Gestion des stocks', icon:<SvgIcon size={15}><path d="M3 9.5L12 3l9 6.5V21H3z"/><rect x="9" y="14" width="6" height="7"/></SvgIcon> },
              ].map(t => (
                <button key={t.id}
                  className={`nav-item ${subTab===t.id?'active':''}`}
                  onClick={() => setSubTab(t.id)}
                  style={{ fontSize:12, padding:'7px 10px' }}>
                  <span style={{ fontSize:14 }}>{t.icon}</span>
                  {t.label}
                </button>
              ))}
            </div>
          )}
        </nav>
        <div className="sidebar-footer">
          <div>Projet Analyse des ventes Walmart</div>
          <div>et modélisation prédictive</div>
          <div>Collège La Cité, Ottawa</div>
        </div>
      </aside>
      <main className="main-content">
        <PageComp />
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
